script: |
  super -s -c "by typeof(this) | sort this" in.sup

inputs:
  - name: in.sup
    data: |
      type sint=int32|string
      {
          r: {
              u: "\"hello\""::sint
          }
      }
      {
          r: {
              v: 123::int32::sint
          }
      }

outputs:
  - name: stdout
    data: |
      type sint=int32|string
      <{r:{u:sint}}>
      <{r:{v:sint}}>
