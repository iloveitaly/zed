script: |
  super -s -c "typeof(this)" in.sup
  echo ===
  super -s -c 'type foo=int64 typeof([1::foo,"bar"])'

inputs:
  - name: in.sup
    data: |
      type foo=int64
      [1::foo,"bar"]

outputs:
  - name: stdout
    data: |
      type foo=int64
      <[foo|string]>
      ===
      type foo=int64
      <[foo|string]>
