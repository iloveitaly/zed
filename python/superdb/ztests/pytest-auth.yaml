script: |
  DB_EXTRA_FLAGS='-auth.enabled=t -auth.audience=a -auth.clientid=c -auth.domain=d -auth.jwkspath=auth-public-jwks.json' source service.sh
  token=$(gentoken -audience a -domain d -keyid testkey -privatekeyfile auth-private-key -tenantid t -userid u)
  super db auth store -access $token -db $SUPER_DB
  python3 -m venv .venv
  .venv/bin/python -m pip install -q '.[test]'
  SUPER_DB_AUTH=1 .venv/bin/pytest test_superdb.py test_auth.py

inputs:
  - name: service.sh
    source: ../../../service/ztests/service.sh
  - name: auth-private-key
    source: ../../../service/testdata/auth-private-key
  - name: auth-public-jwks.json
    source: ../../../service/testdata/auth-public-jwks.json
  - name: superdb.py
    source: ../superdb.py
  - name: pyproject.toml
    source: ../pyproject.toml
  - name: test_superdb.py
    source: ../test_superdb.py
  - name: test_auth.py
    source: ../test_auth.py

outputs:
  - name: stdout
    regexp: \d+ passed
