script: |
  export SUPER_DB=test
  super db init -q
  super db create -q -orderby a:asc poolA
  super db create -q -orderby b:desc poolB
  super db load -q -use poolA a.sup
  super db load -q -use poolB b.sup
  super db -S -c 'from :pools | drop id | sort name | drop ts'
  echo ===
  super db -S -c 'from poolA@main:objects | {nameof:nameof(this),...this} | drop id'
  super db -S -c 'from poolA:log | cut nameof(this)'

inputs:
  - name: a.sup
    data: |
      {a:1}
      {a:2}
  - name: b.sup
    data: |
      {b:3}
      {b:2}
      {b:1}

outputs:
  - name: stdout
    data: |
      type "order.Which" = string
      type "field.Path" = [string]
      type "field.List" = ["field.Path"]
      type "order.SortKey" = {
        order: "order.Which",
        keys: "field.List"
      }
      {
        name: "poolA",
        layout: {
          order: "asc",
          keys: [
            [
              "a"
            ]
          ]
        }::order.SortKey,
        seek_stride: 65536,
        threshold: 524288000
      }
      {
        name: "poolB",
        layout: {
          order: "desc",
          keys: [
            [
              "b"
            ]
          ]
        }::order.SortKey,
        seek_stride: 65536,
        threshold: 524288000
      }
      ===
      {
        nameof: "data.Object",
        min: fusion(0x02::all,<int64>),
        max: fusion(0x04::all,<int64>),
        count: 2::uint64,
        size: 21
      }
      {
        nameof: "db.BranchTip"
      }
      {
        nameof: "Commit"
      }
