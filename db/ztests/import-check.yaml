script: |
  export SUPER_DB=test
  super db init -q
  super db create -q logs
  ! super db load -q -use logs missingfield.sup

inputs:
  - name: missingfield.sup
    data: |
      type foo={a:string,b:string}
      {a:"a",b:"b"}::foo
      {a:"a"}::foo

outputs:
  - name: stderr
    regexp: |
      record decorator incompatible with record value: .*
