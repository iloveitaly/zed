script: |
  export SUPER_DB=test
  super db init -q
  super db create -q logs
  super db load -q -use logs babble.sup
  super db ls -f bsup | super -S -c "drop id,ts" -
  echo ===
  super db -S -c "from logs@main:objects | drop id | min:=defuse(min),max:=defuse(max)"

inputs:
  - name: babble.sup
    source: ../../testdata/babble.sup

#XXX this is fixed
# The keys field should be labeled with (field.)Path.
# See bug #2576
outputs:
  - name: stdout
    data: |
      type "order.Which" = string
      type "field.Path" = [string]
      type "field.List" = ["field.Path"]
      type "order.SortKey" = {
        order: "order.Which",
        keys: "field.List"
      }
      {
        name: "logs",
        layout: {
          order: "desc",
          keys: [
            [
              "ts"
            ]
          ]
        }::order.SortKey,
        seek_stride: 65536,
        threshold: 524288000
      }
      ===
      {
        min: 2020-04-21T22:40:30.06852324Z,
        max: 2020-04-22T01:23:40.0622373Z,
        count: 1000::uint64,
        size: 33523
      }
