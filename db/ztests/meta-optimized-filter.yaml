script: |
  export SUPER_DB=test
  super db init -q
  super db create -use -q test
  seq 20 | super -c 'values {ts: this}' - | super db load -q -
  seq 21 40 | super -c 'values {ts: this}' - | super db load -q -
  super db -s -c 'from test:objects | {min:defuse(min),max:defuse(max)} | max > 20'
  echo ===
  super db -s -c 'from test:partitions |  {min:defuse(min),max:defuse(max)}  | max > 20'

outputs:
  - name: stdout
    data: |
      {min:21,max:40}
      ===
      {min:21,max:40}
