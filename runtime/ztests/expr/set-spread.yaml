spq: values set[...a,...b]

input: |
  {a:set[2,3],b:[2,1],c:"hi"}
  {a:[1,2],b:"hi"}

output: |
  set[1,2,3]
  set[1,2]

---

# Test spreads on union and fusion values.
spq: values set[...this]

input: |
  set[1,2]::(null|set[int64])
  null::(null|set[int64])
  fusion(set[1,2]::(null|set[int64]),<set[int64]>)
  fusion(null::(null|set[int64]),<null>)

output: |
  set[1,2]
  set[]
  set[1,2]
  set[]
