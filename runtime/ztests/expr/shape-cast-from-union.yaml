spq: |
  values cast(this["from"], to)

vector: true

input: |
  {from:null::(string|null),to:<null>}
  {from:null::(string|null),to:<string>}
  {from:1::(int64|string),to:<string>}
  type int64_named=int64 type union_named=int64_named|string {from:1::int64_named::union_named,to:<string>}
  {from:1::int8::(int8|string),to:<int64|string>}
  {from:1::(int64|string),to:<int8|string>}
  {from:"one"::(int64|string),to:<string>}
  {from:[1,"one"],to:<[string]>}
  {from:[1,"one"],to:<[int8|string]>}
  {from:[1,"one"],to:<[int8|int16]>}
  {from:{a:[1,"one"]},to:<{a:[string]}>}
  {from:{a:[1,"one"]},to:<{a:[int8|string]}>}

output: |
  null
  null::(string|null)
  "1"
  "1"
  error({message:"cannot cast to int64|string",on:1::int8})
  error({message:"cannot cast to int8|string",on:1})
  "one"
  ["1","one"]
  [error({message:"cannot cast to int8|string",on:1}),"one"]::[int8|string|error({message:string,on:int64})]
  [error({message:"cannot cast to int8|int16",on:1}),error({message:"cannot cast to int8|int16",on:"one"})]
  {a:["1","one"]}
  {a:[error({message:"cannot cast to int8|string",on:1}),"one"]::[int8|string|error({message:string,on:int64})]}
