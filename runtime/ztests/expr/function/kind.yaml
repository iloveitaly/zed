spq: '{val:this, kind:kind(this)}'

vector: true

input: |
  null
  0x1234
  error(null)
  error("foo")
  {}
  [1,2,3]
  type array=[int8]
  [1,2,3]::array
  type port=uint16
  80::port
  "foo"::(int64|string)
  1::(int64|string)
  <int64>
  <{s:string}>
  set[1,2,3]
  map{1:1,2:2}
  "heads"::enum(heads,tails)

output: |
  {val:null,kind:"primitive"}
  {val:0x1234,kind:"primitive"}
  {val:error(null),kind:"error"}
  {val:error("foo"),kind:"error"}
  {val:{},kind:"record"}
  {val:[1,2,3],kind:"array"}
  type array=[int8]
  {val:[1,2,3]::array,kind:"array"}
  type port=uint16
  {val:80::port,kind:"primitive"}
  {val:"foo"::(int64|string),kind:"union"}
  {val:1::(int64|string),kind:"union"}
  {val:<int64>,kind:"primitive"}
  {val:<{s:string}>,kind:"record"}
  {val:set[1,2,3],kind:"set"}
  {val:map{1:1,2:2},kind:"map"}
  {val:"heads"::enum(heads,tails),kind:"enum"}
