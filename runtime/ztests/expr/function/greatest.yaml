spq: |
  values greatest(a, b, c)

vector: true

input: |
  {a:1,b:2,c:3}
  {a:-1,b:-2,c:-3}
  {a:1::uint64,b:2,c:3}
  {a:1,b:2::uint64,c:3}
  {a:1,b:2,c:3::uint64}
  {a:1.1,b:2,c:3}
  {a:1,b:2.2,c:3}
  {a:1,b:2,c:3.3}
  {a:"1",b:2,c:3}
  {a:1,b:"2",c:3}
  {a:1,b:2,c:"3"}
  {a:1.1::(float64|null),b:2,c:3}
  {a:1,b:2.2::(float64|null),c:3}
  {a:1,b:2,c:3.3::(float64|null)}
  {a:"1",b:error(2),c:null}
  {a:"1",b:error(2),c:3}

