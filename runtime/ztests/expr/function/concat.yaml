spq: concat(a, b, c)

vector: true

input: |
  {a:"hello",b:" ",c:"world"}
  {a:null,b:null,c:null}
  {a:null,b:"b",c:null}
  {a:"a",b:null,c:"c"}
  {a:"a",b:2,c:error("quiet")}
  {a:"a",b:error("quiet"),c:3}

output: |
  "hello world"
  ""
  "b"
  "ac"
  error({message:"concat: string arg required",on:2})

