# Test unblend on records.
spq: unblend(this)

vector: true

input: |
  {x:{y:2::(int64|bool)},z?:"foo"}
  {x:{y:true::(int64|bool)},z?:_::string}
  {}

output: |
  {x:{y:2},z:"foo"}
  {x:{y:true}}
  {}

---

# Test unblend on root unions.
spq: unblend(this)

vector: true

input: |
  1::(int64|bool|{x:int64})
  true::(int64|bool|{x:int64})
  {x:1}::(int64|bool|{x:int64})

output: |
  1
  true
  {x:1}

---

# Test unblend on arrays.
spq: unblend(this)

vector: true

input: |
  [1::(int64|bool|string),2::(int64|bool|string),"string"::(int64|bool|string)]
  [1::(int64|bool|string),2::(int64|bool|string),true::(int64|bool|string)]
  [1::(int64|bool|string),"foo"::(int64|bool|string),false::(int64|bool|string)]
  ["foo"::(int64|bool|string),"bar"::(int64|bool|string),"baz"::(int64|bool|string)]
  []::[(int64|bool|string)]

output: |
  [1,2,"string"]
  [1,2,true]
  [1,"foo",false]
  ["foo","bar","baz"]
  []

---

# Test unblend on elements in an array.
spq: unblend(this)

vector: true

input: |
  [{x:1::(bool|int64|string)},{x:true::(bool|int64|string)},{x:"foo"::(bool|int64|string)}]
  [{x:2::(bool|int64|string)},{x:3::(bool|int64|string)},{x:"bar"::(bool|int64|string)}]
  [{x:true::(bool|int64|string)},{x:false::(bool|int64|string)},{x:"bar"::(bool|int64|string)}]

output: |
  [{x:1},{x:true},{x:"foo"}]
  [{x:2},{x:3},{x:"bar"}]
  [{x:true},{x:false},{x:"bar"}]

---

# Test unblend on view of array.
spq: unblend(this[0])

vector: true

input: |
  [[0::(int64|string),1::(int64|string)],["foo"::(int64|string),2::(int64|string)]]

output: |
  [0,1]

---

# Test unblend on sets.
spq: unblend(this)

vector: true

input: |
  set[1::(int64|bool|string),2::(int64|bool|string),"string"::(int64|bool|string)]
  set[1::(int64|bool|string),2::(int64|bool|string),true::(int64|bool|string)]
  set[1::(int64|bool|string),"foo"::(int64|bool|string),false::(int64|bool|string)]
  set["foo"::(int64|bool|string),"bar"::(int64|bool|string),"baz"::(int64|bool|string)]
  set[]::set[(int64|bool|string)]

output: |
  set[1,2,"string"]
  set[1,2,true]
  set[1,false,"foo"]
  set["bar","baz","foo"]
  set[]

---

# Test unblend on view of set.
spq: unblend(this[0])

vector: true

input: |
  set[set[0::(int64|string),1::(int64|string)],set["foo"::(int64|string),2::(int64|string)]]

output: |
  set[0,1]

---


# Test unblend on maps.
spq: unblend(this)

vector: true

input: |
  map{"k1"::(int64|string):"v1"::(int64|string),"k2"::(int64|string):2::(int64|string)}
  map{"k1"::(int64|string):1::(int64|string),"k2"::(int64|string):2::(int64|string)}
  map{"k1"::(int64|string):"v1"::(int64|string),2::(int64|string):"v2"::(int64|string)}
  map{"k1":"v1"::(int64|string),"k2":"v2"::(int64|string)}
  map{}::map{(int64|string):(int64|string)}

output: |
  map{"k1":"v1","k2":2}
  map{"k1":1,"k2":2}
  map{2:"v2","k1":"v1"}
  map{"k1":"v1","k2":"v2"}
  map{}

---

# Test unblend on view of map.
spq: unblend(this[0])

vector: true

input: |
  map{0:map{"k1"::(int64|string):0},1:map{2::(int64|string):3}}

output: |
  map{"k1":0}
