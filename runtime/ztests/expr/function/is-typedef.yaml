spq: |
  type socket={addr:ip, port:uint16}
  const PI=3.14
  is(src,<socket>) | put pi:=PI

vector: true

input: |
  type socket={addr:ip, port:uint16}
  type conn={info:string,src:socket,dst:socket}
  {
      info: "Connection Example",
      src: {
          addr: 10.1.1.2,
          port: 80::uint16
      },
      dst: {
          addr: 10.0.1.2,
          port: 20130
      }
  }::conn
  type access_list={info:string,nets:[net]}
  {
      info: "Access List Example",
      nets: [
          10.1.1.0/24,
          10.1.2.0/24
      ]
  }::access_list
  {
      info: "Connection Example 2",
      src: {
          addr: 10.1.1.8,
          port: 80::uint16
      },
      dst: {
          addr: 10.1.2.88,
          port: 19801
      }
  }::conn

output: |
  type socket={addr:ip,port:uint16}
  {info:"Connection Example",src:{addr:10.1.1.2,port:80}::socket,dst:{addr:10.0.1.2,port:20130}::socket,pi:3.14}
  {info:"Connection Example 2",src:{addr:10.1.1.8,port:80}::socket,dst:{addr:10.1.2.88,port:19801}::socket,pi:3.14}
