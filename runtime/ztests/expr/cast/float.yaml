spq: values this::float16, this::float32, this::float64

vector: true

input: |
  "1.5"
  "-6.9e20"
  "foo"
  1::uint64
  1000000000::uint64
  type named=int64
  2::named
  false
  true
  null
  null::({}|null)

output: |
  1.5::float16
  1.5::float32
  1.5
  -Inf::float16
  -6.9e+20::float32
  -6.9e+20
  error({message:"cannot cast to float16",on:"foo"})
  error({message:"cannot cast to float32",on:"foo"})
  error({message:"cannot cast to float64",on:"foo"})
  1.::float16
  1.::float32
  1.
  +Inf::float16
  1000000000.::float32
  1000000000.
  2.::float16
  2.::float32
  2.
  0.::float16
  0.::float32
  0.
  1.::float16
  1.::float32
  1.
  null::(float16|null)
  null::(float32|null)
  null::(float64|null)
  null::(float16|null)
  null::(float32|null)
  null::(float64|null)

---

spq: cast(this, <float64>)

vector: true

input: |
  error("bad")
  {x:1}
  [1,2]
  set[1,2]
  map{"x":1}
  "e2"::enum(e1,e2)

output: |
  error("bad")
  error({message:"cannot cast to float64",on:{x:1}})
  error({message:"cannot cast to float64",on:[1,2]})
  error({message:"cannot cast to float64",on:set[1,2]})
  error({message:"cannot cast to float64",on:map{"x":1}})
  error({message:"cannot cast to float64",on:"e2"::enum(e1,e2)})
