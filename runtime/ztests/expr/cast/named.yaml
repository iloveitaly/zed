spq: |
  type named={x:int64}
  cast(this, "named")

vector: true

input: |
  {x:1}
  {x:2}
  "foo"
  "bar"
  type a=string
  "baz"::a
  1::(int64|null)
  null
  error("missing")
  error("foo")

output: |
  type named={x:int64}
  {x:1}::named
  {x:2}::named
  error("type \"named\" already exists")
  error("type \"named\" already exists")
  error("type \"named\" already exists")
  error("type \"named\" already exists")
  error("type \"named\" already exists")
  error("missing")
  error("foo")

---

# Test casting to a named type keeps the named type.
spq: |
  type foo=int64
  values {str:cast(this, "foo"), named:cast(this, foo)}

vector: true

input: |
  1
  2

output: |
  type foo=int64
  {str:1::foo,named:1::foo}
  {str:2::foo,named:2::foo}
