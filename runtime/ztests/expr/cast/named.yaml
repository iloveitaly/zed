spq: |
  type named={x:int64}
  cast(this, "named")

input: |
  {x:1}
  {x:2}
  fusion({x:3}::(null|{x:int64}),<{x:int64}>)
  "foo"
  "bar"
  type a=string
  "baz"::a
  1::(int64|null)
  null
  error("missing")
  error("foo")

output: |
  type named={x:int64}
  {x:1}::named
  {x:2}::named
  {x:3}::named
  error("type \"named\" redefined")
  error("type \"named\" redefined")
  error("type \"named\" redefined")
  error("type \"named\" redefined")
  error("type \"named\" redefined")
  error("missing")
  error("foo")

---

# Test casting to a named type keeps the named type.
spq: |
  type foo=int64
  values {str:cast(this, "foo"), named:cast(this, foo)}

input: |
  1
  2

output: |
  type foo=int64
  {str:1::foo,named:1::foo}
  {str:2::foo,named:2::foo}

