spq: |
  type string_named=string
  type union=int64|string|string_named
  values cast(this, <{a:union}>)

vector: true

input: |
  {a:null}
  {a:1}
  {a:"hello"}
  type string_named=string
  {a:"goodbye"::string_named}

output: |
  type string_named=string
  type union=int64|string|string_named
  {a:null::(null|union)}
  {a:1::union}
  {a:"hello"::union}
  {a:"goodbye"::string_named::union}
