spq: |
  values map{"a":192.168.1.1,"b":192.168.1.2 }, map{}

vector: true

output: |
  map{"a":192.168.1.1,"b":192.168.1.2}
  map{}

---

# Test that maps are normalized.
spq: |
  map{k1:v1,k2:v2}

vector: true

input: |
  {k1:"b",v1:1,k2:"a",v2:2}
  {k1:"a",v1:1,k2:"b",v2:2}
  {k1:"a",v1:1,k2:"a",v2:2}

output: |
  map{"a":2,"b":1}
  map{"a":1,"b":2}
  map{"a":1}

---

# Test union maps.
spq: |
  map{k1:v1,k2:v2}

vector: true

input: |
  {k1:"a",v1:"foo",k2:1,v2:"bar"}
  {k1:1,v1:1,k2:"b",v2:"baz"}

output: |
  map{1:"bar","a":"foo"}
  map{1:1,"b":"baz"}
