spq: val[idx]

input: |
  // array
  {val:[1,2,3,"foo"],idx:-1}
  {val:[1,2,3,"bar"],idx:1::uint8}
  {val:[1,2,3,"foo"],idx:-4}
  {val:[1,2,3,null],idx:3}
  {val:[1,2,3,"foo"],idx:-5}
  {val:null,idx:-5}
  {val:[1,2,3,"foo"],idx:null}
  {val:[1,2,3,"foo"],idx:"hi"}
  {val:[1,2,3,"foo"],idx:9223372036854775808::uint64}
  // set
  {val:set[1,2,3,"foo"],idx:-1}
  {val:set[1,2,3,"bar"],idx:1}
  {val:set[1,2,3,"foo"],idx:-4}
  {val:[1,2,3,null],idx:3}
  {val:set[1,2,3,"foo"],idx:-5}
  {val:set[1,2,3,"foo"],idx:"hi"}
  // record
  {val:{a:"foo",b:"bar"},idx:"a"}
  {val:{a:"bar",b:"baz"},idx:"b"}
  {val:{a:"bar",b:null},idx:"b"}
  {val:{a:"foo",b:"bar"},idx:0}
  {val:{a:"foo",b:"bar"},idx:-1}
  {val:{a:"foo",b:"bar"},idx:1.}
  {val:{a:"bar",b:"baz"},idx:"doesnotexist"}
  // map
  {val:map{"foo":1,1:2},idx:"foo"}
  {val:map{"foo":1,1:2},idx:1}
  {val:map{"foo":1,1:2,"foo":2},idx:"foo"}
  {val:map{"foo":1,1:2},idx:"bar"}
  {val:map{"foo":1,"bar":127.0.0.1},idx:"bar"}

output: |
  "foo"
  2
  1
  null
  error("missing")
  error("missing")
  error({message:"index is not an integer",on:null})
  error({message:"index is not an integer",on:"hi"})
  error({message:"cannot cast to int64",on:9223372036854775808::uint64})
  "foo"
  2
  1
  null
  error("missing")
  error({message:"index is not an integer",on:"hi"})
  "foo"
  "baz"
  null
  "foo"
  "bar"
  error({message:"invalid value for record index",on:1.})
  error("missing")
  1
  2
  1
  error("missing")
  127.0.0.1

---

spq: |
  fn returnArray(): ([1])
  values returnArray()[0],
    cast(["1"],<[int64]>)[0],
    [1][0],
    set[1][0],
    map{1:1}[1],
    {x:1}["x"]

input: |
  null
  
output: |
  1
  1
  1
  1
  1
  1

---

# Test index on named values.
spq: values this[1],this["x"]

input: |
  type foo=[int64]
  [1,2,3]::foo
  type bar=set[int64]
  set[4,5,6]::bar
  type baz=map{int64:string}
  map{1:"foo"}::baz
  type bap={x:int64}
  {"x":123}::bap
  
output: |
  2
  error("missing")
  5
  error("missing")
  "foo"
  error("missing")
  error("missing")
  123

---

# Test index on fused values
spq: val[1].r

input: |
  {val:fusion(2::(int64|[int64|{r:int64}]),<int64>)}
  {val:fusion([1,{r:3}]::(int64|[int64|{r:int64}]),<[int64|{r:int64}]>)}

output: |
  error("missing")
  3
