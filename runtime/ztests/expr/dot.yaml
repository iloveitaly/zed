spq: values a.b

input: |
  {a:{b:1}}
  {a:{b:1::(int64|string)}}
  {a:{b:1}::(int64|{b:int64})}
  {a:{b:1}}::(int64|{a:{b:int64}})
  {a:fusion({b:1}::(null|{b:int64}),<{b:int64}>)}
  {a:fusion(null::(null|{b:int64}),<null>)}
  {a:1}
  {}
  null

output: |
  1
  1::(int64|string)
  1
  1
  1
  error("missing")
  error("missing")
  error("missing")
  error("missing")

---

# Test deoption on dot expressions.
spq: 'values {x:a.b}'

input: |
  {a:{b?:1}}
  {a:{b?:_::int64}}

output: |
  {x:1}
  {x:error("missing")}
