  {a:null::(null|[ip]),b:null::(null|[{b:ip}])}
  {a:[]::[ip],b:[]::[{b:ip}]}
  {a:[1.1.1.1,2.2.2.2],b:[{b:1.1.1.1},{b:2.2.2.2}]}
  {a:[1.1.1.1],b:[{b:null::(ip|null)},{b:2.2.2.2}]}
