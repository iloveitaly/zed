spq: |
  type port=int64
  type prec={p:port}
  type parr=[port]
  values cast(this, <{a:port,b:prec,c:parr}>)

vector: true

input: |
  type myport=int16
  {a:1::myport,b:{p:1::myport},c:[1::myport]}
  {a:1,b:{p:1},c:[1]}


output: |
  type port=int64
  type prec={p:port}
  type parr=[port]
  {a:1::port,b:{p:1}::prec,c:[1]::parr}
  {a:1::port,b:{p:1}::prec,c:[1]::parr}
