spq: |
  values cast(this, <{a:set[ip],b:set[{b:ip}]}>)

vector: true

input: |
  {a:[]::[string],b:[]::[{b:string}]}
  {a:["1.1.1.1","2.2.2.2","2.2.2.2"],b:[{b:"1.1.1.1"},{b:"2.2.2.2"},{b:"2.2.2.2"}]}
  {a:["1.1.1.1"],b:[{b:null},{b:"2.2.2.2"}]}
  {a:["1.1.1.1","2"],b:[{b:null},{b:"1.1.1.1"},{b:"2"}]}

output: |
  {a:set[]::set[ip],b:set[]::set[{b:ip}]}
  {a:set[1.1.1.1,2.2.2.2],b:set[{b:1.1.1.1},{b:2.2.2.2}]}
  {a:set[1.1.1.1],b:set[{b:2.2.2.2},{b:null::(ip|null)}]}
  {a:set[1.1.1.1,error({message:"cannot cast to ip",on:"2"})],b:set[{b:1.1.1.1},{b:null::(ip|null)},{b:error({message:"cannot cast to ip",on:"2"})}]}
