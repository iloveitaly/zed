spq: upcast(this,<any>)

# note: the syntax for fusion values will change from bytes to values soon
# and this test will be updated

input: |
  1
  "foo"
  {x:1}
  <string>

output-flags: -fusion

output: |
  1::any
  "foo"::any
  {x:1}::any
  <string>::any

---

spq: defuse(this::any)

input: &input |
  1
  "foo"
  {x:1}
  <string>

output: *input
