spq: values [...a,...b]

input: |
  {a:set[1,2],b:[0,1,null],c:"hi"}
  {a:set[1,2],b:"hi"}
  {a:[{x:"foo"},null],b:[{x:"bar"}]}
  {a:"foo",b:"bar"}

output: |
  [1,2,0,1,null]
  [1,2]
  [{x:"foo"},null,{x:"bar"}]
  []

---

# Test spreads on union and fusion values.
spq: values [...this]

input: |
  [1,2]::(null|[int64])
  null::(null|[int64])
  fusion([1,2]::(null|[int64]),<[int64]>)
  fusion(null::(null|[int64]),<null>)

output: |
  [1,2]
  []
  [1,2]
  []
