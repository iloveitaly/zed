script: |
  super -s -c 'from files.sup | from f"{f}"'

vector: true

inputs:
  - name: files.sup
    data: |
      {f:"a.sup"}
      {f:"b.sup"}
  - name: a.sup
    data: |
      {s:"hello"}
  - name: b.sup
    data: |
      {s:"world"}

outputs:
  - name: stdout
    data: |
      {s:"hello"}
      {s:"world"}

---

script: |
  super -s -c 'values "a", "b" | ( from f"{this}.sup" | head 1 )'

vector: true

inputs:
  - name: a.sup
    data: |
      {a:1}
      {a:2}
  - name: b.sup
    data: |
      {b:1}
      {b:2}

outputs:
  - name: stdout
    data: |
      {a:1}
      {b:1}
