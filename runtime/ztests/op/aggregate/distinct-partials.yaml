script: |
  super -s -c '
    from test.sup
    | aggregate
      avg(distinct n),
      collect(distinct key),
      count(distinct n),
      sum(distinct n) by key
    | sort key'

vector: true

inputs:
  - name: test.sup
    data: |
      {key:"a",n:1}
      {key:"a",n:2}
      {key:"b",n:1}
      {key:"b",n:0}
      {key:"a",n:1}

outputs:
  - name: stdout
    data: |
      {key:"a",avg:1.5,collect:["a"],count:2,sum:3}
      {key:"b",avg:0.5,collect:["b"],count:2,sum:1}
