# tests that a rename isn't visible to other procs operating on same records.
spq: fork ( rename id2:=id ) ( cut id.orig_h:=id.orig_h ) | sort id

vector: true

input: |
  type port=uint16
  {id:{orig_h:39681::port,resp_h:3389::port}}

output: |
  type port=uint16
  {id:{orig_h:39681::port}}
  {id2:{orig_h:39681::port,resp_h:3389::port}}
