spq: distinct b

input: |
  {a:1,b?:"foo"}
  {a:1,b?:_::string}
  {a:1,b:"foo"}

output: |
  {a:1,b?:"foo"}
  {a:1,b?:_::string}

---

spq: drop a

input: |
  {a:1,b?:"foo"}
  {a:1,b?:_::string}
  {a:1,b:"foo"}

output: |
  {b?:"foo"}
  {b?:_::string}
  {b:"foo"}

---

spq: drop b

input: |
  {a:1,b?:"foo"}
  {a:1,b?:_::string}
  {a:1,b:"foo"}

output: |
  {a:1}
  {a:1}
  {a:1}

---

spq: rename c:=b

input: |
  {a:1,b?:"foo"}
  {a:1,b?:_::string}
  {a?:1,b:"foo"}

output: |
  {a:1,c?:"foo"}
  {a:1,c?:_::string}
  {a?:1,c:"foo"}
