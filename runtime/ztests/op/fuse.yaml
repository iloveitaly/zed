---

spq: fuse

vector: true

input: |
  type p1=int64
  1::p1
  type r1=int64
  type r2={a:r1}
  {a:1}::r2
  type a1=int64
  type a2=[a1]
  [1]::"a2"
  type s1=int64
  type s2=set[s1]
  set[1]::s2
  type m1=int64
  type m2=int64
  type m3=map{m1:m2}
  map{1:2}::m3
  type u1=int64
  type u3=string
  type u2=u1|u3
  1::u1::u2
  type en1=enum(a,b)
  "a"::en1
  type er1=int64
  type er2=error(er1)
  error(1)::er2

output: |
  type a1=int64
  type a2=[a1]
  type en1=enum(a,b)
  type er1=int64
  type er2=error(er1)
  type m1=int64
  type m2=int64
  type m3=map{m1:m2}
  type p1=int64
  type r1=int64
  type r2={a:r1}
  type s1=int64
  type s2=set[s1]
  type u1=int64
  type u3=string
  type u2=u1|u3
  fusion(1::p1::(a2|en1|er2|m3|p1|r2|s2|u2),<p1>)
  fusion({a:1}::r2::(a2|en1|er2|m3|p1|r2|s2|u2),<r2>)
  fusion([1]::"a2"::(a2|en1|er2|m3|p1|r2|s2|u2),<a2>)
  fusion(set[1]::s2::(a2|en1|er2|m3|p1|r2|s2|u2),<s2>)
  fusion(map{1:2}::m3::(a2|en1|er2|m3|p1|r2|s2|u2),<m3>)
  fusion(1::u1::u2::(a2|en1|er2|m3|p1|r2|s2|u2),<u2>)
  fusion("a"::en1::(a2|en1|er2|m3|p1|r2|s2|u2),<en1>)
  fusion(error(1)::er2::(a2|en1|er2|m3|p1|r2|s2|u2),<er2>)
