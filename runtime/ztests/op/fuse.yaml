# Test fuse on fusion values
spq: unnest this into ( fuse )

runtime: vam

input: |
  [fusion({x?:1,y?:_::int64},<{x:int64}>)]
  [fusion({x?:1,y?:_::int64},<{x:int64}>),fusion({x?:_::int64,y?:2},<{y:int64}>)]
  [1,fusion(2::(int64|null),<int64>)]

output: |
  {x:1}
  fusion({x?:1,y?:_::int64},<{x:int64}>)
  fusion({x?:_::int64,y?:2},<{y:int64}>)
  1
  2
