# 13B is enough to buffer the first record in memory but not the second.
script: |
  super -s -fusemem 13B -c blend in.sup

vector: true

inputs:
  - name: in.sup
    data: |
      {a:"hello",b:"world"}
      {b:"goodnight",c:"gracie"}
      {a:null,b:null,c:null}

outputs:
  - name: stderr
    data: ""
  - name: stdout
    data: |
      {a?:"hello"::(string|null|none),b:"world"::(string|null),c?:_::(string|null|none)}
      {a?:_::(string|null|none),b:"goodnight"::(string|null),c?:"gracie"::(string|null|none)}
      {a?:null::(string|null|none),b:null::(string|null),c?:null::(string|null|none)}
