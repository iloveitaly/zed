script: |
  source service.sh
  curl -X POST -d '{"name":"test"}' $SUPER_DB/pool > pool.json
  poolID=$(super -f line -c 'values ksuid(pool.id)' pool.json)
  curl -X POST -d @- $SUPER_DB/pool/$poolID/branch/main > load.json
  curl $SUPER_DB/pool/$poolID/stats

inputs:
  - name: stdin
    source: ../../testdata/babble.sup
  - name: service.sh

outputs:
  - name: stdout
    data: |
      type "nano.Duration"=int64
      type "nano.Span"={ts:time,dur:"nano.Duration"}
      type "exec.PoolStats"={size:int64,span:"nano.Span"}
      {size:33520,span:{ts:2020-04-21T22:40:30.06852324Z,dur:9789993714061}}::exec.PoolStats
