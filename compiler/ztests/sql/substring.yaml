spq: values SUBSTRING(this FROM 3 FOR 2), SUBSTRING(this FROM 3), SUBSTRING(this FOR 3)

input: |
  "foobar"
  "lobster"::(null|string)
  [1,2]

output: |
  "ba"
  "bar"
  "foo"
  "st"
  "ster"
  "lob"
  error({message:"SUBSTRING: string value required",on:[1,2]})
  error({message:"SUBSTRING: string value required",on:[1,2]})
  error({message:"SUBSTRING: string value required",on:[1,2]})
