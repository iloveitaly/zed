script: |
  super compile -C -O -dynamic 'from test.csup | x in ["foo","bar"]'
  echo // ===
  # Test that we still optimize for a tuple which gets translated into a record.
  super compile -C -O -dynamic 'from test.csup | x in ("foo","bar")'

outputs:
  - name: stdout
    data: |
      file test.csup format csup filter (x in ["foo","bar"])
         pruner (
           expr compare("foo", x.min, true)>=0 and compare("foo", x.max, true)<=0 or compare("bar", x.min, true)>=0 and compare("bar", x.max, true)<=0
           fields x.max,x.min
        )
      | where x in ["foo","bar"]
      | output main
      // ===
      file test.csup format csup filter (x in {c0:"foo",c1:"bar"})
         pruner (
           expr compare("foo", x.min, true)>=0 and compare("foo", x.max, true)<=0 or compare("bar", x.min, true)>=0 and compare("bar", x.max, true)<=0
           fields x.max,x.min
        )
      | where x in {c0:"foo",c1:"bar"}
      | output main
