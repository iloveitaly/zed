script: |
  super compile -C -dag 'values {x:1} | cut x'
  ! super compile -C -dag 'cut x'
  ! super compile -C -dag 'values {x:1} | cut x,y'


outputs:
  - name: stdout
    data: |
      null
      | values {x:1}
      | cut x:=x
      | output main
  - name: stderr
    data: |
      no such field "x" at line 1, column 5:
      cut x
          ~
      no such field "y" at line 1, column 22:
      values {x:1} | cut x,y
                           ~
