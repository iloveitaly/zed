script: |
  super compile -C '{x:1,...this}'
  super compile -C '[1,2,3]'
  super compile -C 'set["foo","bar"]'
  super compile -C 'map{"foo":1,"bar":2}'
  super compile -C '1::(int64|string)'
  echo "==="
  super compile -dag -C '{x:1,...this}'
  super compile -dag -C '[1,2,3]'
  super compile -dag -C 'set["foo","bar"]'
  super compile -dag -C 'map{"foo":1,"bar":2}'
  super compile -dag -C '1::(int64|string)'

outputs:
  - name: stdout
    data: |
      values {x:1,...this}
      values [1,2,3]
      values set["foo","bar"]
      values map{"foo":1,"bar":2}
      values 1::<(int64|string)>
      ===
      null
      | values {x:1,...this}
      | output main
      null
      | values [1,2,3]
      | output main
      null
      | values set["foo","bar"]
      | output main
      null
      | values map{"foo":1,"bar":2}
      | output main
      null
      | values cast(1, <id:32>)
      | output main
