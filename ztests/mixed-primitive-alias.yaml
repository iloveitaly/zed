script: |
  super -s a.log b.bsup

inputs:
  - name: a.log
    data: |
      #separator \x09
      #set_separator	,
      #empty_field	(empty)
      #unset_field	-
      #path	conn
      #fields	orig_p
      #types	port
      80
  # {src_port:81::(port=uint16)}
  - name: b.bsup
    data: !!binary gwQBBwRwb3J0AQABCHNyY19wb3J0IACDFAAhAwJR/w==

outputs:
  - name: stdout
    data: |
      type port=uint16
      {_path:"conn",orig_p:80::port::(port|null)}
      {src_port:81::port}
