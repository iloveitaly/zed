script: |
  super -s a.log b.bsup

inputs:
  - name: a.log
    data: |
      #separator \x09
      #set_separator	,
      #empty_field	(empty)
      #unset_field	-
      #path	conn
      #fields	orig_p
      #types	port
      80
  # type port=uint16 {src_port:81::port}
  - name: b.bsup
    data: !!binary hAcBBwRwb3J0AAAAAQABCHNyY19wb3J0IACEFAAhAwJR/w==

outputs:
  - name: stdout
    data: |
      type port=uint16
      {_path:"conn",orig_p:80::port::(port|null)}
      {src_port:81::port}
