script: super - | super -s -

inputs:
  - name: stdin
    data: &stdin |
      {f:null::(null|set[string])}
      {f:set[]::set[string]}
      {f:set[null]::set[string|null]}
      {f:set["dup"]}
      {f:set["a","z"]}
      {f:set["a","z"]}
      {f:set["a","z",null,"dup"]}

outputs:
  - name: stdout
    data: *stdin
