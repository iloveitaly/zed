script: super - | super -s -

inputs:
  - name: stdin
    data: &stdin |
      type foo=int64|string
      {a:"\"hello\""::(string|[int64]|[string]|foo)}
      {a:[1,2]::(string|[int64]|[string]|foo)}
      {a:["\"a\"","\"b\""]::(string|[int64]|[string]|foo)}
      {a:123::foo::(string|[int64]|[string]|foo)}

outputs:
  - name: stdout
    data: *stdin
