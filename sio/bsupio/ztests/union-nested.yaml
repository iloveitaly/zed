script: super - | super -s -

inputs:
  - name: stdin
    data: &stdin |
      type foo=int64|string
      {a:"\"hello\""::(foo|string|[int64]|[string])}
      {a:[1,2]::(foo|string|[int64]|[string])}
      {a:["\"a\"","\"b\""]::(foo|string|[int64]|[string])}
      {a:123::foo::(foo|string|[int64]|[string])}

outputs:
  - name: stdout
    data: *stdin
