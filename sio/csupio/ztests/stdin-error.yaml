script: |
  super -f csup -o t.csup in.sup
  ! cat t.csup | super -i csup -

vector: true

inputs:
  - name: in.sup
    data: |
      ["hello"(=bar),"world"(bar)]
      {a:["hello"(=bar),"world"(bar)]}

outputs:
  - name: stderr
    data: |
      stdio:stdin: Super Columnar requires a seekable input
