spq: pass

input: |
  #separator \x09
  #set_separator	,
  #empty_field	(empty)
  #unset_field	-
  #fields	f
  #types	set[string]
  -
  (empty)

  dup,dup
  ,
  a,z
  z,a
  -,z,a,,dup,dup

output: |
  {f:null::(null|set[string|null])}
  {f:set[]::set[string|null]::(null|set[string|null])}
  {f:set["dup"]::set[string|null]::(null|set[string|null])}
  {f:set[""]::set[string|null]::(null|set[string|null])}
  {f:set["a","z"]::set[string|null]::(null|set[string|null])}
  {f:set["a","z"]::set[string|null]::(null|set[string|null])}
  {f:set["","a","z",null,"dup"]::(null|set[string|null])}
