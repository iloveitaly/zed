spq: pass

input: |
  {s:null::(string|null)}
  {s:"foo"}
  {s:"-"}
  {s:"--"}
  {s:""}
  {s:"(empty)"}
  {s:"\\"}
  {s:"\n\t"}
  {s:"a,b"}
  {s:"[hello"}
  {s:"hello["}
  {s:";"}
  {s:null::(set[string]|null)}
  {s:set[]::set[string]}
  {s:set[""]}
  {s:set["(empty)"]}
  {s:set["abc","xyz"]}
  {s:set["a,b"]}
  {s:null::([string]|null)}
  {s:[]::[string]}
  {s:[""]}
  {s:["(empty)"]}
  {s:["abc","xyz"]}
  {s:["a,b"]}

output-flags: -f zeek

output: |
  #separator \x09
  #set_separator	,
  #empty_field	(empty)
  #unset_field	-
  #fields	s
  #types	string
  -
  #fields	s
  #types	string
  foo
  \x2d
  --
  
  \x28empty)
  \\
  \x0a\x09
  a,b
  [hello
  hello[
  ;
  #fields	s
  #types	set[string]
  -
  #fields	s
  #types	set[string]
  (empty)
  
  \x28empty)
  abc,xyz
  a\x2cb
  #fields	s
  #types	vector[string]
  -
  #fields	s
  #types	vector[string]
  (empty)
  
  \x28empty)
  abc,xyz
  a\x2cb
