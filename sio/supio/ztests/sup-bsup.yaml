# Convert SUP to BSUP and back to make sure binary encoding of typevals works.

script: |
  super -S -c "put t:=typeof(this)" in.sup

inputs:
  - name: in.sup
    data: |
      type foo=uint8
      {a:"hello",b:"world",n:123::int32,f:[1::foo,2::foo,3::foo]}
      {a:"goodbye",b:"world",n:456::int32,f:[4::foo,5::foo,6::foo]}

outputs:
  - name: stdout
    data: |
      type foo = uint8
      {
        a: "hello",
        b: "world",
        n: 123::int32,
        f: [
          1::foo,
          2::foo,
          3::foo
        ],
        t: <{
          a: string,
          b: string,
          n: int32,
          f: [foo]
        }>
      }
      {
        a: "goodbye",
        b: "world",
        n: 456::int32,
        f: [
          4::foo,
          5::foo,
          6::foo
        ],
        t: <{
          a: string,
          b: string,
          n: int32,
          f: [foo]
        }>
      }
