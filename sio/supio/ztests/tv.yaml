spq: "put t:=typeof(s) | put tt:=typeof(t)"

output-flags: -f sup -pretty=4

input: |
  type foo=uint8
  {s:"hello",n:123::int32,a:[1::foo,2::foo,3::foo]}
  {s:"goodbye",n:34::int32,a:[3::foo,4::foo]}

output: |
  type foo = uint8
  {
      s: "hello",
      n: 123::int32,
      a: [
          1::foo,
          2::foo,
          3::foo
      ],
      t: <string>,
      tt: <type>
  }
  {
      s: "goodbye",
      n: 34::int32,
      a: [
          3::foo,
          4::foo
      ],
      t: <string>,
      tt: <type>
  }
