script: |
  super -f csup -o out.csup -
  super -s out.csup

inputs:
  - name: stdin
    data: &input |
      {m:map{"foo":"bar","hello":"goodby"}}
      {m:map{"foo":"bar2","hello2":"goodby"}}
      {m:map{1:"goodbye","foo":null}}
      {m:null::(null|map{int64:string})}
      {m:map{2:"goodbye","bar":null}}

outputs:
  - name: stdout
    data: *input
