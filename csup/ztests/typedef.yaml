script: |
  super -f csup -o out.csup -
  super -s out.csup

inputs:
  - name: stdin
    data: |
      type foo={a:string,b:int64}
      {a:"hello",b:1}::foo
      {a:"there",b:2}::foo
      {a:"goodbye",b:3}
      type bar={a:string,b:int64}
      {a:"world",b:4}::bar

outputs:
  - name: stdout
    data: |
      type foo={a:string,b:int64}
      {a:"hello",b:1}::foo
      {a:"there",b:2}::foo
      {a:"goodbye",b:3}
      type bar={a:string,b:int64}
      {a:"world",b:4}::bar
